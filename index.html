<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Gelişmiş Ödeme Sayfası</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .price { font-size: 24px; color: #e74c3c; font-weight: bold; text-align: center; margin-bottom: 10px; }
        .card-info { position: relative; display: flex; align-items: center; }
        #card-logo { position: absolute; right: 10px; font-size: 24px; display: none; }
        #card-img { position: absolute; right: 10px; height: 25px; width: 40px; object-fit: contain; display: none; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 15px; }
        .bank-details { background: #f9f9f9; padding: 10px; border-radius: 5px; font-size: 13px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Abdülkadir ŞAHİN Ruhu</h2>
    <p style="font-size: 14px; text-align: center;">Ruhumu yasal yollarla satılığa çıkartıyorum...</p>
    <div class="price">10.000.000 TL</div>

    <form id="paymentForm">
        <label>Ödeme Yöntemi</label>
        <select id="method" onchange="toggleFields()">
            <option value="kredi">Kredi Kartı</option>
            <option value="havale">Havale/EFT</option>
            <option value="kripto">Kripto Para</option>
        </select>

        <div id="cardFields">
            <div class="card-info">
                <input type="text" id="cardNo" placeholder="Kart Numarası" maxlength="16" oninput="showLogo()">
                <img id="card-img" src="" alt="Logo">
                <span id="card-logo">💳</span>
            </div>
            <input type="text" placeholder="Kart Sahibi">
            <div style="display: flex; gap: 10px;">
                <input type="text" placeholder="AA/YY" style="width: 50%;">
                <input type="text" placeholder="CVV" style="width: 50%;" maxlength="3">
            </div>
        </div>

        <div id="havaleFields" style="display:none;" class="bank-details">
            <strong>Banka Hesap Bilgilerimiz:</strong><br>
            Banka: Ziraat Bankası A.Ş.<br>
            IBAN: TR42 8391 2746 5920 1847 3625 91<br>
            Alıcı: Abdülkadir Şahin
        </div>

        <div id="kriptoFields" style="display:none;" class="bank-details">
            <strong>Kripto Cüzdan Bilgileri:</strong><br>
            Ağ: ERC-20 (USDT)<br>
            Cüzdan Adresi:<br>
            <input type="text" value="0x123abc456def7890..." readonly style="background:#eee; font-size:12px;">
        </div>

        <button type="button">Ödemeyi Tamamla</button>
    </form>
</div>

<script>
    function toggleFields() {
        const method = document.getElementById('method').value;
        document.getElementById('cardFields').style.display = (method === 'kredi') ? 'block' : 'none';
        document.getElementById('havaleFields').style.display = (method === 'havale') ? 'block' : 'none';
        document.getElementById('kriptoFields').style.display = (method === 'kripto') ? 'block' : 'none';
    }
